<div class="login-screen">
  <div class="login-card">
    <button
      type="button"
      class="lang-toggle"
      (click)="i18n.toggleLang()"
      [attr.aria-label]="i18n.t('header.switchLanguage')"
      [title]="i18n.t('header.switchLanguage')"
    >
      {{ i18n.lang() === 'de' ? 'DE' : 'EN' }}
    </button>
    <h1>MTG Companion</h1>
    <p class="subtitle">{{ i18n.t('resetPassword.subtitle') }}</p>

    <label>
      {{ i18n.t('resetPassword.newPassword') }}
      <input
        type="password"
        [value]="password()"
        (input)="password.set($any($event.target).value)"
      />
    </label>

    <label>
      {{ i18n.t('resetPassword.confirmPassword') }}
      <input
        type="password"
        [value]="confirmPassword()"
        (input)="confirmPassword.set($any($event.target).value)"
      />
    </label>

    @if (errorMessage()) {
      <p class="error">{{ errorMessage() }}</p>
    }

    <button type="button" class="submit-button" [disabled]="busy()" (click)="submit()">
      {{ busy() ? i18n.t('deckView.savingInfo') : i18n.t('resetPassword.save') }}
    </button>
  </div>
</div>
