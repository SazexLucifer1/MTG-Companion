<!-- NEU -->
@if (auth.passwordRecovery()) {
<app-reset-password />
} @else if (auth.currentUser()) {
  <header class="app-header">
    <h1>MTG Companion</h1>
    <div class="header-actions">
      <button
        class="feedback-toggle"
        (click)="feedback.open()"
        [attr.aria-label]="i18n.t('feedback.openAria')"
        [title]="i18n.t('feedback.openAria')"
      >
        🐛
      </button>
      <button
        class="lang-toggle"
        data-tutorial="lang-toggle"
        (click)="i18n.toggleLang()"
        [attr.aria-label]="i18n.t('header.switchLanguage')"
        [title]="i18n.t('header.switchLanguage')"
      >
        {{ i18n.lang() === 'de' ? 'DE' : 'EN' }}
      </button>
      <button class="logout-btn" (click)="auth.signOut()">{{ i18n.t('header.logout') }}</button>
    </div>
  </header>

<main class="content">
  @switch (navigation.activeTab()) { @case ('match') {
  <app-match-tab />
  } @case ('stats') {
  <app-stats-tab />
  } @case ('group') {
  <app-group-tab />
  } @case ('profile') {
  <app-profile-tab />
  } }
</main>

<app-ingame-tracker />
<app-deck-detail-view />
<app-deck-import-dialogs />
<app-deck-pdf-dialog />
<app-tutorial-overlay />
<app-feedback-dialog />
<app-placement-dialog />

<nav class="tab-bar" data-tutorial="tab-bar">
  @for (tab of tabs; track tab.id) {
  <button
    class="tab-item"
    [attr.data-tutorial]="'nav-' + tab.id"
    [class.active]="navigation.activeTab() === tab.id"
    (click)="navigation.goToTab(tab.id)"
  >
    <span class="tab-icon">{{ tab.icon }}</span>
    <span class="tab-label">{{ i18n.t(tab.labelKey) }}</span>
  </button>
  } @if (session.phase() === 'ingame') {
  <button
    class="tab-item ingame-tab"
    [class.active]="!session.minimized()"
    (click)="session.reopenGame()"
  >
    <span class="tab-icon">🎮</span>
    <span class="tab-label">{{ i18n.t('nav.game') }}</span>
  </button>
  }
</nav>
} @else {
<app-login />
}
